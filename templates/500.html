{% extends 'base.html' %}
{% block title %}Server Error – LocalServices{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box" style="text-align: center; padding: 4rem 2.5rem; max-width: 600px;">
    
    <div style="font-size: 5rem; font-weight: 900; color: var(--konst-red); line-height: 1; margin-bottom: 1rem; letter-spacing: -0.05em;">
      500
    </div>
    
    <h2 class="auth-title" style="margin-bottom: 1rem;">Server Error Encountered</h2>
    
    <p class="auth-subtitle" style="margin-bottom: 2.5rem; font-size: 1.1rem;">
      Something went wrong on our end. Our engineering team has been notified. Please try again later.
    </p>

    <div style="display: flex; gap: 1rem; justify-content: center;">
      <a href="{% url 'home' %}" class="btn-primary" style="display: inline-block;">Return Home</a>
      <a href="javascript:window.location.reload(true)" class="btn-outline" style="display: inline-block;">Refresh Page</a>
    </div>

  </div>
</div>
{% endblock %}
