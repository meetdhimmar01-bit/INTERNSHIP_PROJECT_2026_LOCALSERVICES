{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password – LocalServices Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root { --red:#d32f2f; --dark:#1a1a1a; --text:#666; --border:#eaeaea; --bg-alt:#f8f9fa; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-alt); font-family: 'Inter', sans-serif; color: var(--text); }

    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4rem; height: 72px; background: #fff;
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
    }
    .brand { font-size: 1.5rem; font-weight: 900; color: var(--dark); text-decoration: none; text-transform: uppercase; }
    .brand span { color: var(--red); }

    .page { min-height: calc(100vh - 72px); display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }

    .box {
      width: 100%; max-width: 480px; background: #fff;
      padding: 3rem 3.5rem; border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    .lock-icon {
      width: 72px; height: 72px; background: #fff0f0; border: 2px solid #fecaca;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem; color: var(--red);
    }
    .lock-icon svg { width: 32px; height: 32px; stroke: currentColor; fill: none; }

    .title { font-size: 1.75rem; font-weight: 900; color: var(--dark); text-align: center; text-transform: uppercase; letter-spacing:-0.02em; margin-bottom: 0.5rem; }
    .subtitle { font-size: 0.95rem; color: var(--text); text-align: center; margin-bottom: 2rem; }

    .msg-list { margin-bottom: 1.25rem; }
    .msg { padding: 0.85rem 1rem; font-size: 0.88rem; font-weight: 600; border-left: 4px solid var(--red); background: #fdf5f5; color: var(--red); margin-bottom: 0.5rem; }
    .msg.success { border-color: #10b981; background: #ecfdf5; color: #047857; }
    .msg.warning { border-color: #f59e0b; background: #fffbeb; color: #92400e; }

    .form-group { margin-bottom: 1.5rem; }
    .form-label { display: block; font-size: 0.82rem; font-weight: 700; color: var(--dark); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .form-input {
      width: 100%; padding: 0.95rem 1.25rem;
      background: #fff; border: 2px solid var(--border); color: var(--dark);
      font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 600;
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--dark); }
    .form-input::placeholder { color: #aaa; font-weight: 400; }

    .submit-btn {
      width: 100%; padding: 1.1rem; background: var(--red); color: #fff;
      border: none; font-family: 'Inter', sans-serif; font-size: 0.95rem;
      font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em;
      cursor: pointer; transition: background 0.2s; margin-top: 0.5rem;
    }
    .submit-btn:hover { background: #b71c1c; }

    .back-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; }
    .back-link a { color: var(--dark); font-weight: 700; text-decoration: none; border-bottom: 2px solid var(--red); padding-bottom: 2px; }
    .back-link a:hover { color: var(--red); }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="{% url 'home' %}" class="brand">LocalServices <span>Management</span></a>
  </nav>

  <div class="page">
    <div class="box">
      <div class="lock-icon">
        <svg viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1 class="title">Forgot Password</h1>
      <p class="subtitle">Enter your registered email — we'll send you a reset OTP.</p>

      {% if messages %}
      <div class="msg-list">
        {% for message in messages %}
        <div class="msg {% if message.tags == 'success' %}success{% elif message.tags == 'warning' %}warning{% endif %}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required autofocus />
        </div>
        <button type="submit" class="submit-btn">Send Reset OTP</button>
      </form>

      <p class="back-link">Remembered it? <a href="{% url 'core:login' %}">Back to Login</a></p>
    </div>
  </div>
</body>
</html>
