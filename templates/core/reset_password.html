{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – LocalServices Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root { --red:#d32f2f; --dark:#1a1a1a; --text:#666; --border:#eaeaea; --bg-alt:#f8f9fa; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-alt); font-family: 'Inter', sans-serif; color: var(--text); }

    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4rem; height: 72px; background: #fff;
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
    }
    .brand { font-size: 1.5rem; font-weight: 900; color: var(--dark); text-decoration: none; text-transform: uppercase; }
    .brand span { color: var(--red); }

    .page { min-height: calc(100vh - 72px); display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }

    .box {
      width: 100%; max-width: 480px; background: #fff;
      padding: 3rem 3.5rem; border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    .icon-wrap {
      width: 72px; height: 72px; background: #f0fdf4; border: 2px solid #bbf7d0;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem; color: #16a34a;
    }
    .icon-wrap svg { width: 32px; height: 32px; stroke: currentColor; fill: none; }

    .title { font-size: 1.75rem; font-weight: 900; color: var(--dark); text-align: center; text-transform: uppercase; letter-spacing:-0.02em; margin-bottom: 0.5rem; }
    .subtitle { font-size: 0.95rem; color: var(--text); text-align: center; margin-bottom: 2rem; }

    .msg-list { margin-bottom: 1.25rem; }
    .msg { padding: 0.85rem 1rem; font-size: 0.88rem; font-weight: 600; border-left: 4px solid var(--red); background: #fdf5f5; color: var(--red); margin-bottom: 0.5rem; }

    .form-group { margin-bottom: 1.5rem; }
    .form-label { display: block; font-size: 0.82rem; font-weight: 700; color: var(--dark); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .pw-wrap { position: relative; }
    .form-input {
      width: 100%; padding: 0.95rem 3rem 0.95rem 1.25rem;
      background: #fff; border: 2px solid var(--border); color: var(--dark);
      font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 600;
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--dark); }
    .form-input::placeholder { color: #aaa; font-weight: 400; }

    .pw-toggle {
      position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; padding: 0; cursor: pointer; color: #999;
      display: flex; align-items: center;
    }
    .pw-toggle svg { width: 20px; height: 20px; stroke: currentColor; fill: none; }
    .pw-toggle:hover { color: var(--dark); }

    .strength-bar { height: 4px; background: #eee; margin-top: 0.5rem; transition: all 0.3s; }
    .strength-bar .fill { height: 100%; width: 0; transition: width 0.3s, background 0.3s; }

    .submit-btn {
      width: 100%; padding: 1.1rem; background: var(--red); color: #fff;
      border: none; font-family: 'Inter', sans-serif; font-size: 0.95rem;
      font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em;
      cursor: pointer; transition: background 0.2s; margin-top: 0.5rem;
    }
    .submit-btn:hover { background: #b71c1c; }

    .back-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; }
    .back-link a { color: var(--dark); font-weight: 700; text-decoration: none; border-bottom: 2px solid var(--red); padding-bottom: 2px; }
    .back-link a:hover { color: var(--red); }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="{% url 'home' %}" class="brand">LocalServices <span>Management</span></a>
  </nav>

  <div class="page">
    <div class="box">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h1 class="title">Set New Password</h1>
      <p class="subtitle">OTP verified! Choose a strong new password for <strong>{{ email }}</strong>.</p>

      {% if messages %}
      <div class="msg-list">
        {% for message in messages %}
        <div class="msg">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label" for="password">New Password</label>
          <div class="pw-wrap">
            <input type="password" id="password" name="password" class="form-input"
              placeholder="Min. 6 characters" required oninput="checkStrength(this.value)" />
            <button type="button" class="pw-toggle" onclick="togglePw('password', this)">
              <svg viewBox="0 0 24 24" stroke-width="2" class="eye-show"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg viewBox="0 0 24 24" stroke-width="2" class="eye-hide" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <div class="strength-bar"><div class="fill" id="strengthFill"></div></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password_confirm">Confirm Password</label>
          <div class="pw-wrap">
            <input type="password" id="password_confirm" name="password_confirm" class="form-input"
              placeholder="Re-enter password" required />
            <button type="button" class="pw-toggle" onclick="togglePw('password_confirm', this)">
              <svg viewBox="0 0 24 24" stroke-width="2" class="eye-show"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg viewBox="0 0 24 24" stroke-width="2" class="eye-hide" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="submit-btn">Reset Password</button>
      </form>

      <p class="back-link"><a href="{% url 'core:login' %}">Back to Login</a></p>
    </div>
  </div>

  <script>
    function togglePw(inputId, btn) {
      const input = document.getElementById(inputId);
      const show = btn.querySelector('.eye-show'), hide = btn.querySelector('.eye-hide');
      if (input.type === 'password') { input.type = 'text'; show.style.display = 'none'; hide.style.display = 'block'; }
      else { input.type = 'password'; show.style.display = 'block'; hide.style.display = 'none'; }
    }
    function checkStrength(val) {
      const fill = document.getElementById('strengthFill');
      let score = 0;
      if (val.length >= 6) score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const colors = ['#ef4444','#f97316','#eab308','#22c55e','#16a34a'];
      fill.style.width = (score * 20) + '%';
      fill.style.background = colors[score - 1] || '#ef4444';
    }
  </script>
</body>
</html>
