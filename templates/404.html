{% extends 'base.html' %}
{% block title %}Page Not Found – LocalServices{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box" style="text-align: center; padding: 4rem 2.5rem; max-width: 600px;">
    
    <div style="font-size: 5rem; font-weight: 900; color: var(--konst-red); line-height: 1; margin-bottom: 1rem; letter-spacing: -0.05em;">
      404
    </div>
    
    <h2 class="auth-title" style="margin-bottom: 1rem;">Oops! Page Not Found</h2>
    
    <p class="auth-subtitle" style="margin-bottom: 2.5rem; font-size: 1.1rem;">
      We couldn't find the page you're looking for. It might have been removed, renamed, or temporarily unavailable.
    </p>

    <div style="display: flex; gap: 1rem; justify-content: center;">
      <a href="{% url 'home' %}" class="btn-primary" style="display: inline-block;">Go to Homepage</a>
      <a href="javascript:history.back()" class="btn-outline" style="display: inline-block;">Go Back</a>
    </div>

  </div>
</div>
{% endblock %}
